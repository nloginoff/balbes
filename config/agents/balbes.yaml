# Git-safe manifest for the main orchestrator agent (id matches providers.yaml "balbes").
# Secrets (API keys, delegation shared secret) live in .env only.

id: balbes

# Optional per-mode tool allowlists (override providers.yaml tools_allowlist for this agent).
# Omit or leave null to use providers.yaml only.
# tools:
#   ask: [web_search, workspace_read]
#   agent: null
#   dev: null

# HTTP delegation (delegate_to_agent): базовые URL coder/blogger берутся из окружения —
# `CODER_PORT` / `CODER_SERVICE_URL`, `BLOGGER_SERVICE_PORT` / `BLOGGER_SERVICE_URL`
# (см. `shared.config.Settings.coder_base_url` / `blogger_base_url`).
# Опционально переопределить точечно:
# delegate_targets:
#   coder: http://127.0.0.1:18103
#   blogger: http://127.0.0.1:18105

# Telegram UI (оркестратор): см. shared.agent_manifest.TelegramFeatureFlags — всё true по умолчанию.
# telegram:
#   voice: true
#   agents_switch: true

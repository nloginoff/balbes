# Multi-provider LLM Configuration
# Model tiers:
#   free    — default model, no cost, used for heartbeat and as first fallback
#   cheap   — low-cost, used as automatic fallback chain
#   medium  — mid-range, user selection only
#   premium — expensive, user selection only

providers:
  openrouter:
    api_key: ${OPENROUTER_API_KEY}
    base_url: "https://openrouter.ai/api/v1"
    timeout: 120
    headers:
      HTTP-Referer: "https://github.com/nloginoff/balbes"
      X-Title: "Balbes Multi-Agent System"

    models:
      # ── Free ────────────────────────────────────────────────────────────────
      - id: "stepfun/step-3.5-flash:free"
        display_name: "StepFun Step 3.5 Flash"
        tier: free
        cost_per_1k_tokens: 0.0
        context_window: 65536
        capabilities: ["chat", "fast"]

      - id: "minimax/minimax-m2.5:free"
        display_name: "MiniMax M2.5 (Free)"
        tier: free
        cost_per_1k_tokens: 0.0
        context_window: 1000000
        capabilities: ["chat", "long_context"]

      - id: "z-ai/glm-4.5-air:free"
        display_name: "GLM-4.5 Air (Free)"
        tier: free
        cost_per_1k_tokens: 0.0
        context_window: 32768
        capabilities: ["chat", "fast"]

      - id: "arcee-ai/trinity-mini:free"
        display_name: "Trinity Mini (Free)"
        tier: free
        cost_per_1k_tokens: 0.0
        context_window: 32768
        capabilities: ["chat", "fast"]

      - id: "openai/gpt-oss-20b:free"
        display_name: "GPT OSS 20B (Free)"
        tier: free
        cost_per_1k_tokens: 0.0
        context_window: 128000
        capabilities: ["chat", "code"]

      # ── Cheap ───────────────────────────────────────────────────────────────
      - id: "meta-llama/llama-3.1-8b-instruct"
        display_name: "Llama 3.1 8B"
        tier: cheap
        cost_per_1k_tokens: 0.000018
        context_window: 131072
        capabilities: ["chat", "fast", "code"]

      - id: "meta-llama/llama-3.3-70b-instruct"
        display_name: "Llama 3.3 70B"
        tier: cheap
        cost_per_1k_tokens: 0.00008
        context_window: 131072
        capabilities: ["chat", "reasoning", "code"]

      - id: "minimax/minimax-m2.5"
        display_name: "MiniMax M2.5"
        tier: cheap
        cost_per_1k_tokens: 0.001
        context_window: 1000000
        capabilities: ["chat", "long_context"]

      # ── Medium ──────────────────────────────────────────────────────────────
      - id: "moonshotai/kimi-k2.5"
        display_name: "Kimi K2.5"
        tier: medium
        cost_per_1k_tokens: 0.15
        context_window: 131072
        capabilities: ["chat", "reasoning", "code"]

      - id: "google/gemini-3-flash-preview"
        display_name: "Gemini 3 Flash"
        tier: medium
        cost_per_1k_tokens: 0.15
        context_window: 1048576
        capabilities: ["chat", "reasoning", "long_context", "vision"]

      # ── Premium ─────────────────────────────────────────────────────────────
      - id: "z-ai/glm-5-turbo"
        display_name: "GLM-5 Turbo"
        tier: premium
        cost_per_1k_tokens: 0.5
        context_window: 128000
        capabilities: ["chat", "reasoning", "code"]

      - id: "anthropic/claude-sonnet-4.6"
        display_name: "Claude Sonnet 4.6"
        tier: premium
        cost_per_1k_tokens: 3.0
        context_window: 200000
        capabilities: ["chat", "reasoning", "code", "long_context", "analysis"]

      - id: "openai/gpt-5.4"
        display_name: "GPT-5.4"
        tier: premium
        cost_per_1k_tokens: 15.0
        context_window: 128000
        capabilities: ["chat", "reasoning", "code", "analysis"]

  # AITunnel — disabled, no models configured
  aitunnel:
    api_key: ${AITUNNEL_API_KEY}
    base_url: "https://api.aitunnel.com/v1"
    timeout: 60
    enabled: false
    models: []


# Available agents (shown in /agents menu)
# Each agent can override: fallback_chain, token_limits, server_commands
# Omitted fields fall back to the global defaults defined below.
agents:
  - id: "balbes"
    display_name: "Balbes"
    description: "Основной интеллектуальный ассистент"
    emoji: "🤖"
    # Default model when no chat model is configured (inherits active_models[0] if absent)
    # default_model: "openrouter/stepfun/step-3.5-flash:free"

    # If false (default): use only the selected model; on error show the actual
    # API error to the user. If true: silently try models in fallback_chain.
    fallback_enabled: false

    # Fallback chain (only used when fallback_enabled: true)
    fallback_chain:
      - "openrouter/stepfun/step-3.5-flash:free"
      - "openrouter/meta-llama/llama-3.3-70b-instruct"
      - "openrouter/minimax/minimax-m2.5"

    # Token budget for this agent
    token_limits:
      daily: 100000
      hourly: 15000

    # Server commands available in "ask" mode (safe, read-only / info only)
    server_commands_ask:
      mode: whitelist
      timeout_seconds: 120
      allowed_commands:
        - "date"
        - "sleep {n}"
        - "find {path} -name {pattern}"
        - "find {path} -type {type}"
        - "df -h"
        - "free -h"
        - "uptime"
        - "docker ps"
        - "docker logs {container}"
        - "docker stats --no-stream"
        - "systemctl status {service}"
        - "ps aux"
        - "ping -c 4 {host}"
        - "ls {path}"
        - "ls -la {path}"
        - "ls -la"
        - "cat {file}"
        - "head -n {n} {file}"
        - "tail -n {n} {file}"
        - "wc -l {file}"

    # Server commands available in "agent" mode (full dev whitelist)
    server_commands:
      mode: whitelist           # whitelist | any | disabled
      timeout_seconds: 120
      allowed_commands:
        # ── Info / diagnostics (same as ask) ──
        - "date"
        - "sleep {n}"
        - "find {path} -name {pattern}"
        - "find {path} -type {type}"
        - "df -h"
        - "free -h"
        - "uptime"
        - "docker ps"
        - "docker logs {container}"
        - "docker stats --no-stream"
        - "docker restart {container}"
        - "systemctl status {service}"
        - "ps aux"
        - "ping -c 4 {host}"
        - "ls {path}"
        - "ls -la {path}"
        - "ls -la"
        - "cat {file}"
        - "head -n {n} {file}"
        - "tail -n {n} {file}"
        - "wc -l {file}"
        # ── Development ──
        - "python {script}"
        - "python3 {script}"
        - "python -m {module}"
        - "python3 -m {module}"
        - "pip install {package}"
        - "pip list"
        - "pip show {package}"
        - "node {script}"
        - "npm {command}"
        - "npm run {script}"
        - "make {target}"
        - "pytest {path}"
        - "pytest"
        - "ruff check {path}"
        - "ruff format {path}"
        # ── Git ──
        - "git status"
        - "git log --oneline -20"
        - "git log --oneline -{n}"
        - "git diff"
        - "git diff {file}"
        - "git branch"
        - "git add {file}"
        - "git add ."
        - "git commit -m {message}"
        - "git push"
        - "git push origin {branch}"
        - "git pull"
        - "git pull origin {branch}"

  - id: "coder"
    display_name: "Coder"
    description: "Специалист по написанию и анализу кода"
    emoji: "💻"
    # Subset of tools (no blogger-specific tools); omit to allow all from registry
    tools_allowlist:
      - web_search
      - fetch_url
      - execute_command
      - workspace_read
      - workspace_write
      - rename_chat
      - save_to_memory
      - recall_from_memory
      - code_search
      - index_codebase
      - list_agent_tasks
      - get_agent_result
      - cancel_agent_task
      - read_agent_logs
      - file_read
      - file_write
      - file_patch
      - manage_todo
      - manage_schedule
    features:
      delegation: false
    # Coder uses a capable model by default (good at code); overrides chat model for delegations
    default_model: "openrouter/moonshotai/kimi-k2.5"

    fallback_enabled: false

    # Fallback chain (only used when fallback_enabled: true)
    fallback_chain:
      - "openrouter/stepfun/step-3.5-flash:free"
      - "openrouter/moonshotai/kimi-k2.5"
      - "openrouter/meta-llama/llama-3.3-70b-instruct"
      - "openrouter/minimax/minimax-m2.5"

    # Coder can use more tokens (large codebases)
    token_limits:
      daily: 200000
      hourly: 30000

    # Coder: restricted commands in "ask" mode (safe info only)
    server_commands_ask:
      mode: whitelist
      timeout_seconds: 120
      allowed_commands:
        - "date"
        - "sleep {n}"
        - "find {path} -name {pattern}"
        - "find {path} -type {type}"
        - "df -h"
        - "free -h"
        - "uptime"
        - "docker ps"
        - "docker logs {container}"
        - "docker stats --no-stream"
        - "systemctl status {service}"
        - "ps aux"
        - "ls {path}"
        - "ls -la {path}"
        - "ls -la"
        - "cat {file}"
        - "head -n {n} {file}"
        - "tail -n {n} {file}"
        - "wc -l {file}"
        - "pip list"
        - "pip show {package}"
        - "git status"
        - "git log --oneline -20"
        - "git log --oneline -{n}"
        - "git diff"
        - "git diff {file}"
        - "git branch"
        # git with explicit repo path (-C flag)
        - "git -C {path} status"
        - "git -C {path} log --oneline -{n}"
        - "git -C {path} log --oneline -20"
        - "git -C {path} diff"
        - "git -C {path} diff {file}"
        - "git -C {path} branch"
        # ── Search (read-only) ──
        - "grep {pattern} {file}"
        - "grep -n {pattern} {file}"
        - "grep -r {pattern} {path}"
        - "grep -rn {pattern} {path}"
        - "grep -rl {pattern} {path}"
        - "rg {pattern}"
        - "rg {pattern} {path}"
        - "rg -l {pattern} {path}"
        - "diff {file1} {file2}"
        - "diff -u {file1} {file2}"
        - "tree {path}"
        - "tree"
        - "which {command}"

    # Coder: full development whitelist in "agent" mode
    server_commands:
      mode: whitelist
      timeout_seconds: 120      # longer timeout for builds/tests and sleep
      allowed_commands:
        # ── Info / diagnostics ──
        - "date"
        - "sleep {n}"
        - "find {path} -name {pattern}"
        - "find {path} -type {type}"
        - "df -h"
        - "free -h"
        - "uptime"
        - "docker ps"
        - "docker logs {container}"
        - "docker stats --no-stream"
        - "systemctl status {service}"
        - "ps aux"
        - "ls {path}"
        - "ls -la {path}"
        - "ls -la"
        - "cat {file}"
        - "head -n {n} {file}"
        - "tail -n {n} {file}"
        - "wc -l {file}"
        # ── Python / Node ──
        - "python {script}"
        - "python3 {script}"
        - "python -m {module}"
        - "python3 -m {module}"
        - "pip install {package}"
        - "pip list"
        - "pip show {package}"
        - "node {script}"
        - "npm {command}"
        - "npm run {script}"
        # ── Build / test / lint ──
        - "make {target}"
        - "pytest {path}"
        - "pytest"
        - "ruff check {path}"
        - "ruff format {path}"
        - "mypy {path}"
        # ── Git ──
        - "git status"
        - "git log --oneline -20"
        - "git log --oneline -{n}"
        - "git diff"
        - "git diff {file}"
        - "git branch"
        - "git add {file}"
        - "git add ."
        - "git commit -m {message}"
        - "git push"
        - "git push origin {branch}"
        - "git pull"
        - "git pull origin {branch}"
        - "git stash"
        - "git stash pop"
        - "git checkout {branch}"
        - "git checkout -b {branch}"
        # git with explicit repo path (-C flag) — use instead of cd /path && git …
        - "git -C {path} status"
        - "git -C {path} log --oneline -{n}"
        - "git -C {path} log --oneline -20"
        - "git -C {path} diff"
        - "git -C {path} diff {file}"
        - "git -C {path} branch"
        - "git -C {path} add {file}"
        - "git -C {path} add ."
        - "git -C {path} commit -m {message}"
        - "git -C {path} push"
        - "git -C {path} push origin {branch}"
        - "git -C {path} pull"
        - "git -C {path} pull origin {branch}"
        # ── File operations ──
        - "cp {src} {dst}"
        - "mv {src} {dst}"
        - "mkdir {path}"
        - "mkdir -p {path}"
        - "touch {file}"
        - "diff {file1} {file2}"
        - "diff -u {file1} {file2}"
        - "tree {path}"
        - "tree"
        - "which {command}"
        # ── Search / grep ──
        - "grep {pattern} {file}"
        - "grep -n {pattern} {file}"
        - "grep -r {pattern} {path}"
        - "grep -rn {pattern} {path}"
        - "grep -rl {pattern} {path}"
        - "grep -ri {pattern} {path}"
        - "grep -rin {pattern} {path}"
        - "rg {pattern}"
        - "rg {pattern} {path}"
        - "rg -l {pattern} {path}"
        - "rg -n {pattern} {path}"
        - "rg -i {pattern} {path}"
        - "rg -in {pattern} {path}"
        - "rg --files {path}"
        - "rg --files-with-matches {pattern} {path}"
        - "rg -A {n} {pattern} {path}"
        - "rg -B {n} {pattern} {path}"
        - "rg -C {n} {pattern} {path}"
        # ── Script execution ──
        - "bash {script}"
        - "sh {script}"
        - "chmod +x {file}"
        # ── File inspection ──
        - "wc -l {file}"
        - "wc -c {file}"
        - "file {path}"
        - "stat {path}"


# Models available for user selection (shown in /model menu)
# Sorted by tier: free → cheap → medium → premium
active_models:
  # ── Free ──────────────────────────────────────────────────────────────────
  - id: "openrouter/stepfun/step-3.5-flash:free"
    display_name: "🆓 StepFun Step 3.5 Flash"
    tier: free
    provider: openrouter
    context_window: 65536

  - id: "openrouter/minimax/minimax-m2.5:free"
    display_name: "🆓 MiniMax M2.5 (Free)"
    tier: free
    provider: openrouter
    context_window: 1000000

  - id: "openrouter/z-ai/glm-4.5-air:free"
    display_name: "🆓 GLM-4.5 Air (Free)"
    tier: free
    provider: openrouter
    context_window: 32768

  - id: "openrouter/arcee-ai/trinity-mini:free"
    display_name: "🆓 Trinity Mini (Free)"
    tier: free
    provider: openrouter
    context_window: 32768

  - id: "openrouter/openai/gpt-oss-20b:free"
    display_name: "🆓 GPT OSS 20B (Free)"
    tier: free
    provider: openrouter
    context_window: 128000

  # ── Cheap ─────────────────────────────────────────────────────────────────
  - id: "openrouter/meta-llama/llama-3.1-8b-instruct"
    display_name: "💲 Llama 3.1 8B (cheapest)"
    tier: cheap
    provider: openrouter
    context_window: 131072

  - id: "openrouter/meta-llama/llama-3.3-70b-instruct"
    display_name: "💲 Llama 3.3 70B"
    tier: cheap
    provider: openrouter
    context_window: 131072

  - id: "openrouter/minimax/minimax-m2.5"
    display_name: "💲 MiniMax M2.5 (1M ctx)"
    tier: cheap
    provider: openrouter
    context_window: 1000000

  # ── Medium ────────────────────────────────────────────────────────────────
  - id: "openrouter/moonshotai/kimi-k2.5"
    display_name: "🌙 Kimi K2.5"
    tier: medium
    provider: openrouter
    context_window: 131072

  - id: "openrouter/google/gemini-3-flash-preview"
    display_name: "✨ Gemini 3 Flash (1M ctx)"
    tier: medium
    provider: openrouter
    context_window: 1048576

  # ── Premium ───────────────────────────────────────────────────────────────
  - id: "openrouter/z-ai/glm-5-turbo"
    display_name: "⚡ GLM-5 Turbo"
    tier: premium
    provider: openrouter
    context_window: 128000

  - id: "openrouter/anthropic/claude-haiku-4.5"
    display_name: "⚡ Claude Haiku 4.5"
    tier: premium
    provider: openrouter
    context_window: 200000

  - id: "openrouter/anthropic/claude-sonnet-4.6"
    display_name: "🎯 Claude Sonnet 4.6"
    tier: premium
    provider: openrouter
    context_window: 200000

  - id: "openrouter/openai/gpt-5.4"
    display_name: "🏆 GPT-5.4"
    tier: premium
    provider: openrouter
    context_window: 128000


# Fallback Strategy
fallback_strategy:
  on_error: "next_in_chain"
  max_fallback_attempts: 3
  on_token_limit: "switch_to_cheap"
  on_rate_limit: "wait_and_retry"
  rate_limit_wait_seconds: 60


# Default fallback chain: free → cheap only
# Medium and premium are NEVER used as automatic fallback — only by explicit user choice
default_fallback_chain:
  - provider: openrouter
    model: "openrouter/stepfun/step-3.5-flash:free"

  - provider: openrouter
    model: "openrouter/meta-llama/llama-3.3-70b-instruct"

  - provider: openrouter
    model: "openrouter/minimax/minimax-m2.5"


# Cheap models for automatic fallback on token limit
cheap_models:
  - provider: openrouter
    model: "openrouter/stepfun/step-3.5-flash:free"

  - provider: openrouter
    model: "openrouter/meta-llama/llama-3.3-70b-instruct"

  - provider: openrouter
    model: "openrouter/minimax/minimax-m2.5"


# Token limits
token_limits:
  daily_limit_per_agent: 100000
  hourly_limit_per_agent: 15000
  alert_threshold: 0.8
  action_on_exceeded: "switch_to_cheap"


# History / context window management
memory:
  history_strategy: "trim"      # trim | summarize
  # summary_model: "meta-llama/llama-3.1-8b-instruct:free"  # model for summarization (default: llama-3.1-8b free)
  trim_threshold: 0.85          # start trimming at 85% context window fill
  max_messages_in_context: 50   # hard cap regardless of tokens
  system_prompt_reserve: 500    # tokens reserved for system prompt overhead


# Whisper voice transcription (env WHISPER_* — see .env.example; openai-whisper package)
# Hybrid routing: short voice → WHISPER_LOCAL_MODEL (default medium); long/unknown → cloud
# (WHISPER_REMOTE_BACKEND, OpenRouter / Yandex SpeechKit — see whisper_remote_stt)
whisper:
  model: "medium"     # legacy; local path uses WHISPER_LOCAL_MODEL in Settings
  device: "cpu"
  beam_size: 10
  best_of: 5
  patience: 2.0
  language: "ru"        # or empty for auto-detect
  # LLM correction: chat model (from memory) first, then WHISPER_CORRECTION_FALLBACK_MODEL


# Skills configuration
skills:
  web_search:
    enabled: true
    default_provider: "tavily"       # tavily | yandex | brave
    providers:
      tavily:
        enabled: true                # requires TAVILY_API_KEY in .env.prod
        max_results: 5
      yandex:
        enabled: true                # requires YANDEX_SEARCH_KEY + YANDEX_SEARCH_USER in .env.prod
        max_results: 5
        use_deferred: false          # true = deferred (async) Yandex search; false = sync (default)
      brave:
        enabled: false               # enable when BRAVE_SEARCH_KEY is set
        max_results: 5

  fetch_url:
    enabled: true
    max_content_chars: 5000
    timeout_seconds: 15
    allowed_domains: []              # empty = all domains allowed

  server_commands:
    enabled: true
    mode: "whitelist"                # whitelist | any
    timeout_seconds: 30
    log_all_calls: true
    allowed_commands:
      - "date"
      - "find {path} -name {pattern}"
      - "find {path} -type {type}"
      - "df -h"
      - "free -h"
      - "uptime"
      - "docker ps"
      - "docker logs {container}"
      - "docker restart {container}"
      - "docker stats --no-stream"
      - "systemctl status {service}"
      - "ls {path}"
      - "ls -la {path}"
      - "cat {file}"
      - "ps aux"
      - "ping -c 4 {host}"
    blocked_patterns:
      - "rm -rf"
      - ">("
      - "$("
      - "curl | sh"
      - "wget | sh"
      - "; rm"
      - "&& rm"


# Heartbeat — proactive agent messaging
# Always uses the free model regardless of the user's active chat model
heartbeat:
  enabled: true
  every_minutes: 15
  # Primary model (free). On 429/error, tries fallback_models in order.
  # Last fallback is the cheapest paid model. If all fail → error sent to user.
  model: "openrouter/stepfun/step-3.5-flash:free"
  fallback_models:
    - "openrouter/minimax/minimax-m2.5:free"
    - "openrouter/z-ai/glm-4.5-air:free"
    - "openrouter/arcee-ai/trinity-mini:free"
    - "openrouter/openai/gpt-oss-20b:free"
    - "openrouter/meta-llama/llama-3.1-8b-instruct"   # cheapest paid, last resort
  active_hours_start: "09:00"    # local server time
  active_hours_end: "23:00"
  # Delay between consecutive LLM rounds (tool-call → next LLM call).
  # Free models have strict rate limits; 5 seconds prevents 429 errors.
  request_delay_seconds: 5
  # target_user_id is taken from TELEGRAM_USER_ID env var (set in .env.prod)


# Embeddings configuration for Qdrant
embeddings:
  provider: openrouter
  model: "openai/text-embedding-3-small"
  dimensions: 1536
  cost_per_1k_tokens: 0.0001
  batch_size: 100
  cache_ttl: 86400


# Notification settings
notifications:
  telegram_user_id: ${TELEGRAM_USER_ID}

  triggers:
    - type: token_limit_warning
      threshold: 0.8
      message_template: "⚠️ Token Budget Alert\n\nAgent: @{agent_id}\nUsage: {tokens_used:,} / {limit:,} ({percentage:.1f}%)\nCost: ${cost:.2f}\n\nRemaining: {remaining:,} tokens"

    - type: token_limit_exceeded
      message_template: "🚨 Token Limit Exceeded!\n\nAgent: @{agent_id}\nUsage: {tokens_used:,} / {limit:,}\n\nAutomatically switched to: {cheap_model}\n\n⚠️ Quality may be lower."

    - type: model_fallback
      message_template: "⚠️ Model Fallback\n\nAgent: @{agent_id}\nPrimary: {model} (unavailable)\nFallback: {fallback_model}\n\nTask continues..."

    - type: agent_error
      message_template: "❌ Agent Error\n\nAgent: @{agent_id}\nError: {error_message}\nTask: #{task_id}"

    - type: task_completed
      message_template: "✅ Task Completed\n\nAgent: @{agent_id}\nTask: #{task_id}\nDuration: {duration}s\nTokens: {tokens:,}"

    - type: task_failed
      message_template: "❌ Task Failed\n\nAgent: @{agent_id}\nTask: #{task_id}\nError: {error}"


# Retry configuration
retry:
  max_attempts: 3
  backoff_strategy: "exponential"
  initial_delay_seconds: 1
  max_delay_seconds: 30


# Rate limiting
rate_limiting:
  enabled: true
  window_seconds: 60
  max_requests_per_window: 10


# Timeouts
timeouts:
  llm_call: 60
  skill_execution: 30
  database_query: 10
  http_request: 30


# Blogger agent configuration
blogger:
  enabled: true
  post_quota_per_day: 3
  channels:
    ru:
      id: "${BLOGGER_CHANNEL_RU}"
      auto_publish: false   # Set to true after testing to enable auto-publishing
    en:
      id: "${BLOGGER_CHANNEL_EN}"
      auto_publish: false
    personal:
      id: "${BLOGGER_CHANNEL_PERSONAL}"
      auto_publish: false   # Personal blog always requires approval — never change to true
  evening_checkin_hour: 20   # 20:00 Moscow time
  source_agents:
    - balbes
    - coder
  cursor_files_dir: "data/cursor_chats"   # Drop Cursor AI .md exports here
  business:
    summary_hours: 24          # Hours of business messages to include in summary
    min_messages_for_summary: 10  # Minimum messages before generating summary

# Multi-provider LLM Configuration
# Model tiers:
#   free    — default model, no cost, used for heartbeat and as first fallback
#   cheap   — low-cost, used as automatic fallback chain
#   medium  — mid-range, user selection only
#   premium — expensive, user selection only

providers:
  openrouter:
    api_key: ${OPENROUTER_API_KEY}
    base_url: "https://openrouter.ai/api/v1"
    timeout: 60
    headers:
      HTTP-Referer: "https://github.com/nloginoff/balbes"
      X-Title: "Balbes Multi-Agent System"

    models:
      # ── Free ────────────────────────────────────────────────────────────────
      - id: "stepfun/step-3.5-flash:free"
        display_name: "StepFun Step 3.5 Flash"
        tier: free
        cost_per_1k_tokens: 0.0
        context_window: 65536
        capabilities: ["chat", "fast"]

      # ── Cheap ───────────────────────────────────────────────────────────────
      - id: "meta-llama/llama-3.3-70b-instruct"
        display_name: "Llama 3.3 70B"
        tier: cheap
        cost_per_1k_tokens: 0.00008
        context_window: 131072
        capabilities: ["chat", "reasoning", "code"]

      - id: "minimax/minimax-m2.5"
        display_name: "MiniMax M2.5"
        tier: cheap
        cost_per_1k_tokens: 0.001
        context_window: 1000000
        capabilities: ["chat", "long_context"]

      # ── Medium ──────────────────────────────────────────────────────────────
      - id: "moonshotai/kimi-k2.5"
        display_name: "Kimi K2.5"
        tier: medium
        cost_per_1k_tokens: 0.15
        context_window: 131072
        capabilities: ["chat", "reasoning", "code"]

      - id: "google/gemini-2.5-flash-preview"
        display_name: "Gemini 2.5 Flash"
        tier: medium
        cost_per_1k_tokens: 0.15
        context_window: 1048576
        capabilities: ["chat", "reasoning", "long_context", "vision"]

      # ── Premium ─────────────────────────────────────────────────────────────
      - id: "z-ai/glm-5-turbo"
        display_name: "GLM-5 Turbo"
        tier: premium
        cost_per_1k_tokens: 0.5
        context_window: 128000
        capabilities: ["chat", "reasoning", "code"]

      - id: "anthropic/claude-sonnet-4-5"
        display_name: "Claude Sonnet 4.5"
        tier: premium
        cost_per_1k_tokens: 3.0
        context_window: 200000
        capabilities: ["chat", "reasoning", "code", "long_context", "analysis"]

      - id: "openai/gpt-4.5-preview"
        display_name: "GPT-4.5 Preview"
        tier: premium
        cost_per_1k_tokens: 15.0
        context_window: 128000
        capabilities: ["chat", "reasoning", "code", "analysis"]

  # AITunnel — disabled, no models configured
  aitunnel:
    api_key: ${AITUNNEL_API_KEY}
    base_url: "https://api.aitunnel.com/v1"
    timeout: 60
    enabled: false
    models: []


# Available agents (shown in /agents menu)
agents:
  - id: "orchestrator"
    display_name: "Balbes"
    description: "Основной интеллектуальный ассистент"
    emoji: "🤖"
  - id: "coder"
    display_name: "Coder"
    description: "Специалист по написанию и анализу кода"
    emoji: "💻"


# Models available for user selection (shown in /model menu)
# Sorted by tier: free → cheap → medium → premium
active_models:
  # ── Free ──────────────────────────────────────────────────────────────────
  - id: "openrouter/stepfun/step-3.5-flash:free"
    display_name: "🆓 StepFun Step 3.5 Flash"
    tier: free
    provider: openrouter
    context_window: 65536

  # ── Cheap ─────────────────────────────────────────────────────────────────
  - id: "openrouter/meta-llama/llama-3.3-70b-instruct"
    display_name: "💲 Llama 3.3 70B"
    tier: cheap
    provider: openrouter
    context_window: 131072

  - id: "openrouter/minimax/minimax-m2.5"
    display_name: "💲 MiniMax M2.5 (1M ctx)"
    tier: cheap
    provider: openrouter
    context_window: 1000000

  # ── Medium ────────────────────────────────────────────────────────────────
  - id: "openrouter/moonshotai/kimi-k2.5"
    display_name: "🌙 Kimi K2.5"
    tier: medium
    provider: openrouter
    context_window: 131072

  - id: "openrouter/google/gemini-2.5-flash-preview"
    display_name: "✨ Gemini 2.5 Flash (1M ctx)"
    tier: medium
    provider: openrouter
    context_window: 1048576

  # ── Premium ───────────────────────────────────────────────────────────────
  - id: "openrouter/z-ai/glm-5-turbo"
    display_name: "⚡ GLM-5 Turbo"
    tier: premium
    provider: openrouter
    context_window: 128000

  - id: "openrouter/anthropic/claude-sonnet-4-5"
    display_name: "🎯 Claude Sonnet 4.5"
    tier: premium
    provider: openrouter
    context_window: 200000

  - id: "openrouter/openai/gpt-4.5-preview"
    display_name: "🏆 GPT-4.5 Preview"
    tier: premium
    provider: openrouter
    context_window: 128000


# Fallback Strategy
fallback_strategy:
  on_error: "next_in_chain"
  max_fallback_attempts: 3
  on_token_limit: "switch_to_cheap"
  on_rate_limit: "wait_and_retry"
  rate_limit_wait_seconds: 60


# Default fallback chain: free → cheap only
# Medium and premium are NEVER used as automatic fallback — only by explicit user choice
default_fallback_chain:
  - provider: openrouter
    model: "openrouter/stepfun/step-3.5-flash:free"

  - provider: openrouter
    model: "openrouter/meta-llama/llama-3.3-70b-instruct"

  - provider: openrouter
    model: "openrouter/minimax/minimax-m2.5"


# Cheap models for automatic fallback on token limit
cheap_models:
  - provider: openrouter
    model: "openrouter/stepfun/step-3.5-flash:free"

  - provider: openrouter
    model: "openrouter/meta-llama/llama-3.3-70b-instruct"

  - provider: openrouter
    model: "openrouter/minimax/minimax-m2.5"


# Token limits
token_limits:
  daily_limit_per_agent: 100000
  hourly_limit_per_agent: 15000
  alert_threshold: 0.8
  action_on_exceeded: "switch_to_cheap"


# History / context window management
memory:
  history_strategy: "trim"      # trim | summarize
  trim_threshold: 0.85          # start trimming at 85% context window fill
  max_messages_in_context: 50   # hard cap regardless of tokens
  system_prompt_reserve: 500    # tokens reserved for system prompt overhead


# Whisper voice transcription
whisper:
  model: "base"         # tiny | base | small | medium | large
  device: "cpu"
  compute_type: "int8"  # int8 uses less RAM, near-identical accuracy
  language: "ru"        # fixed language for faster + more accurate transcription


# Skills configuration
skills:
  web_search:
    enabled: true
    default_provider: "duckduckgo"   # duckduckgo | brave | tavily
    providers:
      duckduckgo:
        enabled: true
        max_results: 5
      brave:
        enabled: false               # enable when BRAVE_SEARCH_KEY is set
        api_key: ${BRAVE_SEARCH_KEY}
        max_results: 5
      tavily:
        enabled: false               # enable when TAVILY_API_KEY is set
        api_key: ${TAVILY_API_KEY}
        max_results: 5

  fetch_url:
    enabled: true
    max_content_chars: 5000
    timeout_seconds: 15
    allowed_domains: []              # empty = all domains allowed

  server_commands:
    enabled: true
    mode: "whitelist"                # whitelist | any
    timeout_seconds: 30
    log_all_calls: true
    allowed_commands:
      - "df -h"
      - "free -h"
      - "uptime"
      - "docker ps"
      - "docker logs {container}"
      - "docker restart {container}"
      - "docker stats --no-stream"
      - "systemctl status {service}"
      - "ls {path}"
      - "cat {file}"
      - "ps aux"
      - "ping -c 4 {host}"
    blocked_patterns:
      - "rm -rf"
      - ">("
      - "$("
      - "curl | sh"
      - "wget | sh"
      - "; rm"
      - "&& rm"


# Heartbeat — proactive agent messaging
# Always uses the free model regardless of the user's active chat model
heartbeat:
  enabled: true
  every_minutes: 5
  model: "openrouter/stepfun/step-3.5-flash:free"
  active_hours_start: "09:00"    # local server time
  active_hours_end: "23:00"
  target_user_id: ${TELEGRAM_USER_ID}


# Embeddings configuration for Qdrant
embeddings:
  provider: openrouter
  model: "openai/text-embedding-3-small"
  dimensions: 1536
  cost_per_1k_tokens: 0.0001
  batch_size: 100
  cache_ttl: 86400


# Notification settings
notifications:
  telegram_user_id: ${TELEGRAM_USER_ID}

  triggers:
    - type: token_limit_warning
      threshold: 0.8
      message_template: "⚠️ Token Budget Alert\n\nAgent: @{agent_id}\nUsage: {tokens_used:,} / {limit:,} ({percentage:.1f}%)\nCost: ${cost:.2f}\n\nRemaining: {remaining:,} tokens"

    - type: token_limit_exceeded
      message_template: "🚨 Token Limit Exceeded!\n\nAgent: @{agent_id}\nUsage: {tokens_used:,} / {limit:,}\n\nAutomatically switched to: {cheap_model}\n\n⚠️ Quality may be lower."

    - type: model_fallback
      message_template: "⚠️ Model Fallback\n\nAgent: @{agent_id}\nPrimary: {model} (unavailable)\nFallback: {fallback_model}\n\nTask continues..."

    - type: agent_error
      message_template: "❌ Agent Error\n\nAgent: @{agent_id}\nError: {error_message}\nTask: #{task_id}"

    - type: task_completed
      message_template: "✅ Task Completed\n\nAgent: @{agent_id}\nTask: #{task_id}\nDuration: {duration}s\nTokens: {tokens:,}"

    - type: task_failed
      message_template: "❌ Task Failed\n\nAgent: @{agent_id}\nTask: #{task_id}\nError: {error}"


# Retry configuration
retry:
  max_attempts: 3
  backoff_strategy: "exponential"
  initial_delay_seconds: 1
  max_delay_seconds: 30


# Rate limiting
rate_limiting:
  enabled: true
  window_seconds: 60
  max_requests_per_window: 10


# Timeouts
timeouts:
  llm_call: 60
  skill_execution: 30
  database_query: 10
  http_request: 30

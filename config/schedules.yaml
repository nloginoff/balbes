# Cron-like schedule for agent tasks.
#
# Each job has:
#   id        — unique identifier (used in logs)
#   enabled   — true/false to toggle without deleting
#   trigger   — cron | interval
#   agent_id  — which agent runs the task (matches config/agents/<id>/config.yaml)
#   user_id   — whose context to use (0 = system/bot owner, or real Telegram user_id)
#   prompt    — the task description sent to the agent
#   debug     — whether to stream debug trace (default: false)
#
# Cron trigger fields (all optional, default = every minute when omitted):
#   day_of_week  — mon,tue,wed,thu,fri,sat,sun  (or *)
#   hour         — 0-23
#   minute       — 0-59
#
# Interval trigger fields:
#   seconds | minutes | hours   — interval value (pick one)
#
# Example: run blogger summary every day at 08:00 and 20:00
# - id: blogger_morning
#   enabled: false
#   trigger: cron
#   agent_id: orchestrator
#   user_id: "0"
#   hour: 8
#   minute: 0
#   prompt: "Напиши утренний пост для блога на основе вчерашних разговоров."
#
# ─────────────────────────────────────────────
# ACTIVE SCHEDULES
# ─────────────────────────────────────────────

jobs:
  # Daily morning briefing — disabled by default until you configure it
  - id: daily_morning_briefing
    enabled: false
    trigger: cron
    agent_id: orchestrator
    user_id: "0"
    hour: 9
    minute: 0
    prompt: >
      Доброе утро! Подготовь краткий утренний дайджест:
      проверь актуальные новости по темам из MEMORY.md,
      напомни о незавершённых задачах, если они есть.
    debug: false

  # Weekly project status — disabled by default
  - id: weekly_status
    enabled: false
    trigger: cron
    agent_id: orchestrator
    user_id: "0"
    day_of_week: mon
    hour: 10
    minute: 0
    prompt: >
      Начало недели. Сформируй краткий статус проекта:
      что было сделано на прошлой неделе (по памяти),
      какие задачи запланированы.
    debug: false

  # Hourly reminder (example with interval trigger) — disabled
  - id: hourly_ping
    enabled: false
    trigger: interval
    agent_id: orchestrator
    user_id: "0"
    minutes: 60
    prompt: "Проверь, нет ли срочных уведомлений или задач."
    debug: false

version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: balbes-prod-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-balbes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-balbes}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-balbes} -d ${POSTGRES_DB:-balbes}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - balbes-prod-network

  redis:
    image: redis:7-alpine
    container_name: balbes-prod-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --save 900 1 --save 300 10
    ports:
      - "6379:6379"
    volumes:
      - redis_prod_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - balbes-prod-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: balbes-prod-qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_prod_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - balbes-prod-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: balbes-prod-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_prod_data:/var/lib/rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - balbes-prod-network

volumes:
  postgres_prod_data:
    name: balbes_prod_postgres_data
    driver: local
  redis_prod_data:
    name: balbes_prod_redis_data
    driver: local
  qdrant_prod_data:
    name: balbes_prod_qdrant_data
    driver: local
  rabbitmq_prod_data:
    name: balbes_prod_rabbitmq_data
    driver: local

networks:
  balbes-prod-network:
    name: balbes-prod-network
    driver: bridge

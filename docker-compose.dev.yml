version: '3.8'

services:
  postgres-dev:
    image: postgres:15
    container_name: balbes-dev-postgres
    environment:
      POSTGRES_USER: balbes
      POSTGRES_PASSWORD: balbes_secret
      POSTGRES_DB: balbes_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U balbes -d balbes_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-dev:
    image: redis:7-alpine
    container_name: balbes-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  qdrant-dev:
    image: qdrant/qdrant:latest
    container_name: balbes-dev-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_dev_data:
    name: balbes_dev_postgres_data
  redis_dev_data:
    name: balbes_dev_redis_data
  qdrant_dev_data:
    name: balbes_dev_qdrant_data
